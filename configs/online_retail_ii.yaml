dataset:
  name: "online_retail_ii"
  source_url: "https://archive.ics.uci.edu/ml/machine-learning-databases/00502/online_retail_II.xlsx"
  local_path: "data/online_retail_II.xlsx"
  file_type: "excel"
  # ``null`` → load *every* sheet and concatenate. Online Retail II ships
  # with two sheets ("Year 2009-2010" and "Year 2010-2011"); loading just
  # one truncates the post-snapshot label window for the val/test splits.
  sheet_name: null

dataset_schema:
  customer_id: "Customer ID"
  invoice_id: "Invoice"
  invoice_date: "InvoiceDate"
  quantity: "Quantity"
  unit_price: "Price"
  country: "Country"

cleaning:
  drop_missing_customer_id: true
  drop_negative_quantity: true
  drop_zero_price: true
  drop_duplicates: true
  outlier_method: "iqr"
  outlier_columns: ["Quantity", "Price"]

features:
  snapshot_dates:
    train: "2010-06-01"
    val: "2010-12-01"
    # Data ends 2011-12-09. A 90-day churn/CLV window needs data through
    # snapshot + 90d, so the latest safe test snapshot is ~2011-09-10;
    # 2011-09-01 keeps a margin. A later date silently mislabels censored
    # customers as churned (see assert_sufficient_future_window).
    test: "2011-09-01"
  churn_window_days: 90
  clv_window_days: 90
  rolling_windows: [30, 60, 90]
  use_log_transform: true
  scaler: "standard"

modeling:
  target: "churn"  # or "clv"
  test_size: 0.2
  cv_folds: 5
  use_smote: true
  models:
    - "xgboost"
  hyperparameter_tuning:
    n_trials: 50
    timeout: 600

output:
  model_dir: "models/"
  figures_dir: "outputs/figures/"
  tables_dir: "outputs/tables/"

api:
  # Ceiling on records per /predict/batch call, kept config-driven so it can
  # be tuned per deployment without a code change.
  max_batch_size: 500